services:
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
      - "443:443"
    networks:
      - web
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./traefik/traefik.yml:/etc/traefik/traefik.yml:ro"
      - "letsencrypt:/letsencrypt"

  buyraq:
    image: "public.ecr.aws/${ECR_PUBLIC_ALIAS}/buyraq:${BUYRAQ_TAG:-latest}"
    restart: unless-stopped
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.buyraq.rule=Host(`buyraq.com`)"
      - "traefik.http.routers.buyraq.entrypoints=websecure"
      - "traefik.http.routers.buyraq.tls.certresolver=letsencrypt"
      - "traefik.http.services.buyraq.loadbalancer.server.port=80"

  codehelp:
    image: "public.ecr.aws/${ECR_PUBLIC_ALIAS}/codehelp:${CODEHELP_TAG:-latest}"
    restart: unless-stopped
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.codehelp.rule=Host(`codehelp.pp.ua`)"
      - "traefik.http.routers.codehelp.entrypoints=websecure"
      - "traefik.http.routers.codehelp.tls.certresolver=letsencrypt"
      - "traefik.http.services.codehelp.loadbalancer.server.port=80"

  cosmeticpro:
