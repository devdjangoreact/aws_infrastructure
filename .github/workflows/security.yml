name: Security

# Security and IaC quality gate. On main pushes this must pass before deploy.yml
# is allowed to touch infrastructure.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    name: Security gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint init
        working-directory: terraform
        run: tflint --init

      - name: TFLint
        working-directory: terraform
        run: tflint --recursive

      - name: Checkov (Terraform IaC security)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          quiet: true
          soft_fail: false

      # - name: Trivy config scan (Dockerfile / misconfig)
      #   uses: aquasecurity/trivy-action@v0.36.0
      #   with:
      #     scan-type: config
      #     scan-ref: .
      #     severity: CRITICAL,HIGH
      #     exit-code: '1'

      # - name: Trivy image scan (nginx:alpine base)
      #   uses: aquasecurity/trivy-action@v0.36.0
      #   with:
      #     scan-type: image
      #     image-ref: nginx:alpine
      #     severity: CRITICAL,HIGH
      #     ignore-unfixed: true
      #     exit-code: '1'

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: scripts
