name: Security

# Security and IaC quality gates. Runs independently of deploy.yml and never
# touches infrastructure: secret scanning, Terraform security/lint, image and
# shell-script analysis.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  terraform:
    name: Terraform lint + IaC scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint init
        working-directory: terraform
        run: tflint --init

      - name: TFLint
        working-directory: terraform
        run: tflint --recursive

      - name: Checkov (Terraform IaC security)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          quiet: true
          soft_fail: false

  trivy:
    name: Container & config scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy config scan (Dockerfile / misconfig)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Trivy image scan (nginx:alpine base)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: nginx:alpine
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

  shellcheck:
    name: Shell script analysis (ShellCheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: scripts
